version: 2

project_name: flux

before:
  hooks:
    - go work sync

builds:
  - id: flux
    dir: cli
    binary: flux
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: flux
    builds: [flux]
    name_template: "flux_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: darwin
        formats: [zip]
      - goos: linux
        formats: [tar.gz]
    files:
      - none*  # binary only, no extra files

checksum:
  name_template: "flux_{{ .Version }}_checksums.txt"
  algorithm: sha256

brews:
  - name: flux
    ids: [flux]
    repository:
      owner: kendricklawton
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://liquidmetal.dev
    description: "flux — the Liquid Metal CLI"
    license: MIT
    install: |
      bin.install "flux"
    test: |
      system "#{bin}/flux", "--help"

release:
  github:
    owner: kendricklawton
    name: liquid-metal
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto  # tags like v0.1.0-beta are marked pre-release automatically

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
