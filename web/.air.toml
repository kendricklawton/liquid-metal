root = "."
tmp_dir = "tmp"

[build]
cmd = "templ generate ./... && go build -o ./tmp/web ./cmd/web"
bin = "./tmp/web"
delay = 500
exclude_dir = ["tmp", "gen"]
include_ext = ["go", "templ"]
kill_delay = "1s"
rerun_delay = 500
send_interrupt = true

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
