syntax = "proto3";

package liquidmetal.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/kendricklawton/liquid-metal/gen/go/liquidmetal/v1;liquidmetalv1";

enum Engine {
  ENGINE_UNSPECIFIED = 0;
  ENGINE_METAL = 1;
  ENGINE_LIQUID = 2;
}

enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_PROVISIONING = 1;
  SERVICE_STATUS_RUNNING = 2;
  SERVICE_STATUS_FAILED = 3;
  SERVICE_STATUS_STOPPED = 4;
}

message Service {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string slug = 4;
  Engine engine = 5;
  ServiceStatus status = 6;
  string upstream_addr = 7;
  string commit_sha = 8;
  string commit_message = 9;
  string node_id = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp provisioned_at = 13;
}

// ─── STANDARD CRUD ──────────────────────────────────────────────────────────

message ListServicesRequest {
  string project_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListServicesResponse {
  repeated Service services = 1;
  string next_page_token = 2;
}

message GetServiceRequest {
  string id = 1;
}
message GetServiceResponse {
  Service service = 1;
}

message DeleteServiceRequest {
  string id = 1;
}
message DeleteServiceResponse {}

message StopServiceRequest {
  string id = 1;
}
message StopServiceResponse {}

message RestartServiceRequest {
  string id = 1;
}
message RestartServiceResponse {
  Service service = 1;
}

message GetServiceLogsRequest {
  string service_id = 1;
  int32 limit = 2;
  string page_token = 3;
}
message LogLine {
  string message = 1;
  google.protobuf.Timestamp ts = 2;
}
message GetServiceLogsResponse {
  repeated LogLine lines = 1;
  string next_page_token = 2;
}

// ─── TWO-STEP DEPLOYMENT FLOW ───────────────────────────────────────────────

message GetUploadUrlRequest {
  string project_id = 1;
  string slug = 2;
  Engine engine = 3;
  string deploy_id = 4;
}

message GetUploadUrlResponse {
  string upload_url = 1;
  string artifact_key = 2;
}

message DeployRequest {
  string project_id = 1;
  string name = 2;
  string slug = 3;
  Engine engine = 4;
  string deploy_id = 5;
  string artifact_key = 6;
  string sha256 = 7;

  // Enforces that Liquid deployments cannot send Metal memory specs
  oneof spec {
    MetalSpec metal = 8;
    LiquidSpec liquid = 9;
  }
}

message MetalSpec {
  int32 vcpu = 1;
  int32 memory_mb = 2;
  int32 port = 3;
}

message LiquidSpec {
  string entrypoint = 1;
}

message DeployResponse {
  Service service = 1;
}

// ─── SERVICE DEFINITION ─────────────────────────────────────────────────────

service ServiceService {
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);

  // Two-step execution flow replaces monolithic CreateService
  rpc GetUploadUrl(GetUploadUrlRequest) returns (GetUploadUrlResponse);
  rpc Deploy(DeployRequest) returns (DeployResponse);

  rpc StopService(StopServiceRequest) returns (StopServiceResponse);
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);
  rpc GetServiceLogs(GetServiceLogsRequest) returns (GetServiceLogsResponse);
}
