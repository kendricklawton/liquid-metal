syntax = "proto3";
package platform.v1;

option go_package = "github.com/kendricklawton/project-platform/gen/go/platform/v1;platformv1";

service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse) {}
}

message CreateWorkspaceRequest {
  string name = 1;
  string slug = 2;
}

message CreateWorkspaceResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
}
