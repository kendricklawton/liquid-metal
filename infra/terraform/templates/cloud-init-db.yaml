#cloud-config
# ── Database Node: Postgres 16 + PgBouncer + Promtail + node_exporter ────────
# Dedicated to the database. No Nomad, no application workloads.
# 12-Factor: Secrets centralized in /etc/liquid-metal/secrets.env.
hostname: ${hostname}

packages:
  - curl
  - unzip
  - ufw
  - chrony
  - gnupg
  - lsb-release

runcmd:
  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=${tailscale_auth_key} --hostname=${hostname} --advertise-tags=tag:liquid-metal

  # Firewall — no public ports; Postgres and PgBouncer listen on Tailscale only
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw --force enable

  # ── NTP (clock skew prevention) ────────────────────────────────────────────
  - systemctl enable chrony
  - systemctl start chrony

  # ── SSH Hardening ───────────────────────────────────────────────────────────
  - apt-get install -y fail2ban
  - |
    cat > /etc/fail2ban/jail.local <<EOF
    [sshd]
    enabled = true
    port = ssh
    maxretry = 5
    bantime = 3600
    findtime = 600
    EOF
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?KbdInteractiveAuthentication.*/KbdInteractiveAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?X11Forwarding.*/X11Forwarding no/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # ── Central Secrets (12-Factor III) ─────────────────────────────────────────
  - mkdir -p /etc/liquid-metal /opt/liquid-metal
  - chmod 700 /etc/liquid-metal
  - |
    cat > /etc/liquid-metal/secrets.env <<'EOFENV'
    PG_USER=${pg_user}
    PG_PASSWORD=${pg_password}
    PG_DBNAME=${pg_dbname}
    GCS_BUCKET_POSTGRES=${gcs_bucket_postgres}
    HOSTNAME_SELF=${hostname}
    VLOGS_URL=${vlogs_url}
    HEARTBEAT_URL_POSTGRES=${heartbeat_url_postgres}
    EOFENV
  - chmod 600 /etc/liquid-metal/secrets.env

  # GCS service account key
  - |
    cat > /etc/liquid-metal/gcs-sa.json <<'EOFKEY'
    ${gcs_sa_key}
    EOFKEY
  - chmod 600 /etc/liquid-metal/gcs-sa.json

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  - sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
  - curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
  - apt-get update
  - apt-get install -y postgresql-16 pgbouncer

  # Postgres tuning for 32GB RAM
  - |
    cat >> /etc/postgresql/16/main/conf.d/liquid-metal.conf <<EOF
    listen_addresses = '*'
    max_connections = 200
    shared_buffers = 8GB
    effective_cache_size = 24GB
    work_mem = 64MB
    maintenance_work_mem = 2GB
    wal_buffers = 64MB
    checkpoint_completion_target = 0.9
    random_page_cost = 1.1
    effective_io_concurrency = 200
    min_wal_size = 1GB
    max_wal_size = 4GB
    log_min_duration_statement = 500
    EOF

  # Allow connections from Tailscale CGNAT range
  - |
    cat >> /etc/postgresql/16/main/pg_hba.conf <<EOF
    # Tailscale connections (all nodes)
    host all all 100.64.0.0/10 scram-sha-256
    EOF

  # Create database and user
  - systemctl restart postgresql
  - |
    sudo -u postgres psql <<SQL
    CREATE USER ${pg_user} WITH PASSWORD '${pg_password}';
    CREATE DATABASE ${pg_dbname} OWNER ${pg_user};
    GRANT ALL PRIVILEGES ON DATABASE ${pg_dbname} TO ${pg_user};
    SQL

  # ── PgBouncer ──────────────────────────────────────────────────────────────
  - |
    cat > /etc/pgbouncer/pgbouncer.ini <<EOF
    [databases]
    ${pg_dbname} = host=127.0.0.1 port=5432 dbname=${pg_dbname}

    [pgbouncer]
    listen_addr = *
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 400
    default_pool_size = 20
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_lifetime = 3600
    server_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    stats_period = 60
    admin_users = pgbouncer
    EOF

  - |
    cat > /etc/pgbouncer/userlist.txt <<EOF
    "${pg_user}" "${pg_password}"
    EOF
  - chmod 640 /etc/pgbouncer/userlist.txt
  - chown postgres:postgres /etc/pgbouncer/userlist.txt
  - systemctl restart pgbouncer
  - systemctl enable pgbouncer

  # ── gsutil (GCS CLI) ───────────────────────────────────────────────────────
  - curl -fsSL https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz | tar -xz -C /opt
  - /opt/google-cloud-sdk/install.sh --quiet --path-update=true
  - ln -sf /opt/google-cloud-sdk/bin/gsutil /usr/local/bin/gsutil
  - ln -sf /opt/google-cloud-sdk/bin/gcloud /usr/local/bin/gcloud
  - gcloud auth activate-service-account --key-file=/etc/liquid-metal/gcs-sa.json

  # ── Postgres Backup Cron ───────────────────────────────────────────────────
  # pg_dump runs locally — no network hop. Daily at 03:00 UTC → GCS.
  - mkdir -p /opt/backups/scripts /var/log/backups
  - |
    cat > /opt/backups/scripts/backup-postgres.sh <<'EOFSCRIPT'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%SZ)
    DUMP_FILE="/tmp/pg-$TIMESTAMP.sql.gz"
    sudo -u postgres pg_dump -d "$PG_DBNAME" --no-owner --no-acl | gzip > "$DUMP_FILE"
    gsutil cp "$DUMP_FILE" "gs://$GCS_BUCKET_POSTGRES/$TIMESTAMP.sql.gz"
    rm -f "$DUMP_FILE"
    echo "$(date -u) postgres backup complete" >> /var/log/backups/postgres.log
    [ -n "$HEARTBEAT_URL_POSTGRES" ] && curl -fsS --retry 3 "$HEARTBEAT_URL_POSTGRES" > /dev/null
    EOFSCRIPT
  - chmod +x /opt/backups/scripts/backup-postgres.sh
  - |
    (crontab -l 2>/dev/null || true; cat <<'EOFCRON'
    0 3 * * * /opt/backups/scripts/backup-postgres.sh 2>&1 | tee -a /var/log/backups/postgres.log
    EOFCRON
    ) | crontab -

  # ── Logrotate: backup logs ──────────────────────────────────────────────────
  - |
    cat > /etc/logrotate.d/liquid-metal-backups <<'EOF'
    /var/log/backups/*.log {
      daily
      rotate 7
      compress
      delaycompress
      missingok
      notifempty
      create 0644 root root
    }
    EOF

  # ── Promtail ─────────────────────────────────────────────────────────────────
  - curl -fsSL https://github.com/grafana/loki/releases/download/v3.4.2/promtail-linux-amd64.zip -o /tmp/promtail.zip
  - unzip /tmp/promtail.zip -d /usr/local/bin/
  - chmod +x /usr/local/bin/promtail-linux-amd64
  - mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
  - mkdir -p /etc/promtail /var/lib/promtail
  - |
    cat > /etc/promtail/config.yaml <<EOF
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /var/lib/promtail/positions.yaml

    clients:
      - url: http://${vlogs_url}:9428/insert/loki/api/v1/push
        batchsize: 1048576
        batchwait: 3s
        backoff_config:
          min_period: 500ms
          max_period: 30s
          max_retries: 10

    limits_config:
      readline_rate_enabled: true
      readline_rate: 5000
      readline_burst: 10000
      readline_rate_drop: true

    scrape_configs:
      - job_name: journal
        journal:
          max_age: 12h
          labels:
            node: ${hostname}
        relabel_configs:
          - source_labels: ['__journal__systemd_unit']
            target_label: unit
    EOF
  - |
    cat > /etc/systemd/system/promtail.service <<EOF
    [Unit]
    Description=Promtail
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yaml
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl daemon-reload
  - systemctl enable promtail
  - systemctl start promtail

  # ── node_exporter ────────────────────────────────────────────────────────────
  - curl -fsSL https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz | tar -xz -C /tmp
  - mv /tmp/node_exporter-1.8.2.linux-amd64/node_exporter /usr/local/bin/node_exporter
  - chmod +x /usr/local/bin/node_exporter
  - |
    cat > /etc/systemd/system/node_exporter.service <<EOF
    [Unit]
    Description=Prometheus Node Exporter
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/node_exporter
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl daemon-reload
  - systemctl enable node_exporter
  - systemctl start node_exporter
