#cloud-config
# ── NAT VPS: HAProxy + NATS + Nomad Server + Observability ───────────────────
# 12-Factor: All secrets centralized in /etc/liquid-metal/secrets.env.
# Config files are templates rendered by /opt/liquid-metal/render-configs.sh.
# To rotate secrets: update secrets.env, run render-configs.sh, restart services.
hostname: ${hostname}

packages:
  - haproxy
  - curl
  - ufw
  - unzip
  - pgbouncer
  - postgresql-client
  - gettext-base  # provides envsubst

runcmd:
  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=${tailscale_auth_key} --hostname=${hostname} --advertise-tags=tag:liquid-metal

  # Firewall — only expose :80, :443, :3478 (Tailscale STUN) publicly
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 3478/udp
  - ufw --force enable

  # ── SSH Hardening ───────────────────────────────────────────────────────────
  - apt-get install -y fail2ban
  - |
    cat > /etc/fail2ban/jail.local <<EOF
    [sshd]
    enabled = true
    port = ssh
    maxretry = 5
    bantime = 3600
    findtime = 600
    EOF
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?KbdInteractiveAuthentication.*/KbdInteractiveAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?X11Forwarding.*/X11Forwarding no/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # ── Central Secrets (12-Factor III) ─────────────────────────────────────────
  # Single source of truth for all credentials on this node.
  # To rotate: update this file, run /opt/liquid-metal/render-configs.sh,
  # then restart affected services.
  - mkdir -p /etc/liquid-metal /etc/liquid-metal/templates /opt/liquid-metal
  - chmod 700 /etc/liquid-metal
  - |
    cat > /etc/liquid-metal/secrets.env <<'EOFENV'
    # ── Postgres ─────────────────────────────────────────────────────────────
    PG_HOST=${pg_host}
    PG_PORT=${pg_port}
    PG_DBNAME=${pg_dbname}
    PG_USER=${pg_user}
    PG_PASSWORD=${pg_password}
    # ── NATS (per-role credentials for subject ACLs) ──────────────────────────
    NATS_USER=${nats_user}
    NATS_PASSWORD=${nats_password}
    NATS_PASSWORD_DAEMON=${nats_password_daemon}
    NATS_PASSWORD_PROXY=${nats_password_proxy}
    # ── Grafana ──────────────────────────────────────────────────────────────
    GRAFANA_ADMIN_PASSWORD=${grafana_admin_password}
    # ── S3 (Vultr Object Storage) ────────────────────────────────────────────
    S3_ENDPOINT=${s3_endpoint}
    S3_ACCESS_KEY=${s3_access_key}
    S3_SECRET_KEY=${s3_secret_key}
    S3_BUCKET=${s3_bucket}
    # ── Cloudflare ───────────────────────────────────────────────────────────
    CLOUDFLARE_API_TOKEN=${cloudflare_api_token}
    # ── GCS Backup Buckets ───────────────────────────────────────────────────
    GCS_BUCKET_POSTGRES=${gcs_bucket_postgres}
    GCS_BUCKET_VICTORIAMETRICS=${gcs_bucket_victoriametrics}
    GCS_BUCKET_VICTORIALOGS=${gcs_bucket_victorialogs}
    GCS_BUCKET_ARTIFACTS=${gcs_bucket_artifacts}
    # ── Topology ─────────────────────────────────────────────────────────────
    NODE_A_01_HOSTNAME=${node_a_01_hostname}
    NODE_B_01_HOSTNAME=${node_b_01_hostname}
    DOMAIN=${domain}
    # ── Backup Heartbeats (dead man's switch) ───────────────────────────────
    HEARTBEAT_URL_POSTGRES=${heartbeat_url_postgres}
    HEARTBEAT_URL_VICTORIAMETRICS=${heartbeat_url_victoriametrics}
    HEARTBEAT_URL_VICTORIALOGS=${heartbeat_url_victorialogs}
    HEARTBEAT_URL_ARTIFACTS=${heartbeat_url_artifacts}
    # ── Alert Routing ───────────────────────────────────────────────────────
    SLACK_WEBHOOK_URL=${slack_webhook_url}
    EOFENV
  - chmod 600 /etc/liquid-metal/secrets.env

  # GCS service account key (JSON — must be a file, not an env var)
  - |
    cat > /etc/liquid-metal/gcs-sa.json <<'EOFKEY'
    ${gcs_sa_key}
    EOFKEY
  - chmod 600 /etc/liquid-metal/gcs-sa.json

  # ── Config Templates ────────────────────────────────────────────────────────
  # Templates use $VAR placeholders. render-configs.sh applies envsubst.

  # NATS server config (multi-user with per-subject ACLs)
  - |
    cat > /etc/liquid-metal/templates/nats.conf <<'EOFTPL'
    listen: 0.0.0.0:4222
    http_port: 8222

    authorization {
      users: [
        # API — publishes provision/deprovision/suspend, subscribes to usage events.
        # Also publishes via outbox (any platform.* subject stored in the outbox table).
        {
          user: $NATS_USER
          password: $NATS_PASSWORD
          permissions: {
            publish: {
              allow: [
                "platform.provision",
                "platform.deprovision",
                "platform.suspend",
                "$JS.API.>"
              ]
            }
            subscribe: {
              allow: [
                "platform.usage_metal",
                "platform.usage_liquid",
                "_INBOX.>"
              ]
            }
          }
        },
        # Daemon — subscribes to provision/deprovision/suspend/traffic_pulse,
        # publishes route updates, usage events, and deprovision (idle timeout).
        {
          user: daemon
          password: $NATS_PASSWORD_DAEMON
          permissions: {
            publish: {
              allow: [
                "platform.route_updated",
                "platform.route_removed",
                "platform.usage_metal",
                "platform.usage_liquid",
                "platform.deprovision",
                "$JS.API.>"
              ]
            }
            subscribe: {
              allow: [
                "platform.provision",
                "platform.deprovision",
                "platform.suspend",
                "platform.traffic_pulse",
                "_INBOX.>"
              ]
            }
          }
        },
        # Proxy — publishes traffic pulses, subscribes to route cache updates.
        {
          user: proxy
          password: $NATS_PASSWORD_PROXY
          permissions: {
            publish: {
              allow: ["platform.traffic_pulse"]
            }
            subscribe: {
              allow: [
                "platform.route_updated",
                "platform.route_removed"
              ]
            }
          }
        }
      ]
    }

    jetstream {
      store_dir: /var/lib/nats/jetstream
      max_mem: 256MB
      max_file: 4GB
    }
    EOFTPL

  # PgBouncer config
  - |
    cat > /etc/liquid-metal/templates/pgbouncer.ini <<'EOFTPL'
    [databases]
    $PG_DBNAME = host=$PG_HOST port=$PG_PORT dbname=$PG_DBNAME

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 400
    default_pool_size = 20
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_tls_sslmode = require
    log_connections = 0
    log_disconnections = 0
    EOFTPL

  # PgBouncer userlist
  - |
    cat > /etc/liquid-metal/templates/userlist.txt <<'EOFTPL'
    "$PG_USER" "$PG_PASSWORD"
    EOFTPL

  # Cloudflare credentials for certbot
  - |
    cat > /etc/liquid-metal/templates/cloudflare.ini <<'EOFTPL'
    dns_cloudflare_api_token = $CLOUDFLARE_API_TOKEN
    EOFTPL

  # Grafana datasource provisioning
  - |
    cat > /etc/liquid-metal/templates/grafana-datasources.yaml <<'EOFTPL'
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://127.0.0.1:8428
        isDefault: true
      - name: VictoriaLogs
        uid: victorialogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://127.0.0.1:9428
      - name: Tempo
        type: tempo
        access: proxy
        url: http://127.0.0.1:3200
      - name: Postgres
        uid: postgres
        type: postgres
        access: proxy
        url: 127.0.0.1:6432
        database: $PG_DBNAME
        user: $PG_USER
        secureJsonData:
          password: $PG_PASSWORD
        jsonData:
          sslmode: disable
          maxOpenConns: 2
    EOFTPL

  # Grafana main config
  - |
    cat > /etc/liquid-metal/templates/grafana.ini <<'EOFTPL'
    [server]
    http_port = 3001

    [security]
    admin_user = admin
    admin_password = $GRAFANA_ADMIN_PASSWORD

    [paths]
    provisioning = /etc/grafana/provisioning
    data = /mnt/observability/grafana

    [plugins]
    allow_loading_unsigned_plugins = victoriametrics-logs-datasource
    EOFTPL

  # Grafana alert contact points (Slack)
  - |
    cat > /etc/liquid-metal/templates/grafana-contactpoints.yaml <<'EOFTPL'
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: slack
        receivers:
          - uid: slack-default
            type: slack
            settings:
              url: $SLACK_WEBHOOK_URL
    EOFTPL

  # Grafana notification policy — route all alerts to Slack
  - |
    cat > /etc/liquid-metal/templates/grafana-policies.yaml <<'EOFTPL'
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: slack
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
    EOFTPL

  # Grafana dashboard provisioning
  - |
    cat > /etc/liquid-metal/templates/grafana-dashboards.yaml <<'EOFTPL'
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Liquid Metal
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards/json
          foldersFromFilesStructure: false
    EOFTPL

  # Dashboard: Node Overview
  - |
    cat > /etc/liquid-metal/templates/dashboard-node-overview.json <<'EOFTPL'
    {
      "uid": "node-overview",
      "title": "Node Overview",
      "tags": ["liquid-metal", "infrastructure"],
      "timezone": "utc",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [{
          "name": "instance",
          "type": "query",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "query": "label_values(up{job=\"node_exporter\"}, instance)",
          "refresh": 2,
          "includeAll": true,
          "current": { "text": "All", "value": "$__all" }
        }]
      },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "CPU Usage %",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\",instance=~\"$instance\"}[5m])) * 100)", "legendFormat": "{{instance}}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } }
        },
        {
          "id": 2, "type": "timeseries", "title": "Memory Usage %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "(1 - (node_memory_MemAvailable_bytes{instance=~\"$instance\"} / node_memory_MemTotal_bytes{instance=~\"$instance\"})) * 100", "legendFormat": "{{instance}}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } }
        },
        {
          "id": 3, "type": "timeseries", "title": "Disk I/O (Read)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "rate(node_disk_read_bytes_total{instance=~\"$instance\"}[5m])", "legendFormat": "{{instance}} {{device}}" }],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 4, "type": "timeseries", "title": "Disk I/O (Write)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "rate(node_disk_written_bytes_total{instance=~\"$instance\"}[5m])", "legendFormat": "{{instance}} {{device}}" }],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 5, "type": "timeseries", "title": "Network Traffic (Receive)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "rate(node_network_receive_bytes_total{instance=~\"$instance\",device!~\"lo|veth.*|tap.*\"}[5m])", "legendFormat": "{{instance}} {{device}}" }],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 6, "type": "timeseries", "title": "Network Traffic (Transmit)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "rate(node_network_transmit_bytes_total{instance=~\"$instance\",device!~\"lo|veth.*|tap.*\"}[5m])", "legendFormat": "{{instance}} {{device}}" }],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 7, "type": "gauge", "title": "Filesystem Usage",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\",instance=~\"$instance\"} / node_filesystem_size_bytes{mountpoint=\"/\",instance=~\"$instance\"})) * 100", "legendFormat": "{{instance}}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [{"value": 0, "color": "green"}, {"value": 70, "color": "yellow"}, {"value": 90, "color": "red"}] } } }
        },
        {
          "id": 8, "type": "timeseries", "title": "System Load (1m)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "node_load1{instance=~\"$instance\"}", "legendFormat": "{{instance}}" }]
        }
      ],
      "schemaVersion": 39
    }
    EOFTPL

  # Dashboard: API Metrics
  - |
    cat > /etc/liquid-metal/templates/dashboard-api-metrics.json <<'EOFTPL'
    {
      "uid": "api-metrics",
      "title": "API Metrics",
      "tags": ["liquid-metal", "api"],
      "timezone": "utc",
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Request Rate (req/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total{job=\"api\"}[5m])) by (path)", "legendFormat": "{{path}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2, "type": "timeseries", "title": "Error Rate (4xx+5xx)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total{job=\"api\",status=~\"4..|5..\"}[5m])) by (path, status)", "legendFormat": "{{path}} {{status}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3, "type": "timeseries", "title": "Latency p50",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"api\"}[5m])) by (le, path))", "legendFormat": "{{path}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4, "type": "timeseries", "title": "Latency p95",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"api\"}[5m])) by (le, path))", "legendFormat": "{{path}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 5, "type": "timeseries", "title": "Latency p99",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"api\"}[5m])) by (le, path))", "legendFormat": "{{path}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 6, "type": "stat", "title": "Total Requests (24h)",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(increase(http_requests_total{job=\"api\"}[24h]))" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 7, "type": "stat", "title": "Error Rate % (5m)",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total{job=\"api\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"api\"}[5m])) * 100" }],
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "steps": [{"value": 0, "color": "green"}, {"value": 1, "color": "yellow"}, {"value": 5, "color": "red"}] } } }
        }
      ],
      "schemaVersion": 39
    }
    EOFTPL

  # Dashboard: NATS Overview
  - |
    cat > /etc/liquid-metal/templates/dashboard-nats-overview.json <<'EOFTPL'
    {
      "uid": "nats-overview",
      "title": "NATS Overview",
      "tags": ["liquid-metal", "nats"],
      "timezone": "utc",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Active Connections",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "gnatsd_connz_total{job=\"nats\"}" }]
        },
        {
          "id": 2, "type": "stat", "title": "Total Subscriptions",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "gnatsd_varz_subscriptions{job=\"nats\"}" }]
        },
        {
          "id": 3, "type": "stat", "title": "Slow Consumers",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "gnatsd_varz_slow_consumers{job=\"nats\"}" }],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{"value": 0, "color": "green"}, {"value": 1, "color": "red"}] } } }
        },
        {
          "id": 4, "type": "stat", "title": "Server Uptime",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "gnatsd_varz_uptime{job=\"nats\"}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 5, "type": "timeseries", "title": "Messages In/Out (rate)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(gnatsd_varz_in_msgs{job=\"nats\"}[5m])", "legendFormat": "in" },
            { "expr": "rate(gnatsd_varz_out_msgs{job=\"nats\"}[5m])", "legendFormat": "out" }
          ],
          "fieldConfig": { "defaults": { "unit": "msg/s" } }
        },
        {
          "id": 6, "type": "timeseries", "title": "Bytes In/Out (rate)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(gnatsd_varz_in_bytes{job=\"nats\"}[5m])", "legendFormat": "in" },
            { "expr": "rate(gnatsd_varz_out_bytes{job=\"nats\"}[5m])", "legendFormat": "out" }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 7, "type": "timeseries", "title": "JetStream Storage Used",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "jetstream_server_file_store_bytes{job=\"nats\"}", "legendFormat": "file" },
            { "expr": "jetstream_server_mem_store_bytes{job=\"nats\"}", "legendFormat": "memory" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 8, "type": "timeseries", "title": "JetStream Consumer Pending",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "jetstream_consumer_num_pending{job=\"nats\"}", "legendFormat": "{{stream}} / {{consumer}}" }]
        }
      ],
      "schemaVersion": 39
    }
    EOFTPL

  # Grafana Tempo config (tracing backend)
  - |
    cat > /etc/liquid-metal/templates/tempo.yaml <<'EOFTPL'
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"

    storage:
      trace:
        backend: local
        local:
          path: /mnt/observability/tempo
        wal:
          path: /mnt/observability/tempo/wal

    metrics_generator:
      storage:
        path: /mnt/observability/tempo/generator/wal
    EOFTPL

  # Gatus uptime monitor config
  - |
    cat > /etc/liquid-metal/templates/gatus.yaml <<'EOFTPL'
    storage:
      type: sqlite
      path: /var/lib/gatus/data.db

    ui:
      title: Liquid Metal Status
      header: Liquid Metal Platform Status

    endpoints:
      - name: API Health
        url: "http://$NODE_A_01_HOSTNAME:7070/healthz"
        interval: 30s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"

      - name: HTTPS (Proxy)
        url: "https://$DOMAIN"
        interval: 30s
        conditions:
          - "[STATUS] < 500"
          - "[CERTIFICATE_EXPIRATION] > 14d"

      - name: NATS
        url: "tcp://127.0.0.1:4222"
        interval: 30s
        conditions:
          - "[CONNECTED] == true"

      - name: VictoriaMetrics
        url: "http://127.0.0.1:8428/health"
        interval: 60s
        conditions:
          - "[STATUS] == 200"

      - name: Grafana
        url: "http://127.0.0.1:3001/api/health"
        interval: 60s
        conditions:
          - "[STATUS] == 200"

    web:
      address: "127.0.0.1"
      port: 8080
    EOFTPL

  # rclone config
  - |
    cat > /etc/liquid-metal/templates/rclone.conf <<'EOFTPL'
    [vultr-s3]
    type = s3
    provider = Other
    access_key_id = $S3_ACCESS_KEY
    secret_access_key = $S3_SECRET_KEY
    endpoint = https://$S3_ENDPOINT
    acl = private

    [gcs-backups]
    type = google cloud storage
    service_account_file = /etc/liquid-metal/gcs-sa.json
    bucket_policy_only = true
    EOFTPL

  # HAProxy config
  - |
    cat > /etc/liquid-metal/templates/haproxy.cfg <<'EOFTPL'
    global
      log /dev/log local0
      chroot /var/lib/haproxy
      stats socket /run/haproxy/admin.sock mode 660 level admin
      stats timeout 30s
      user haproxy
      group haproxy
      daemon
      maxconn 4096
      ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
      ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
      tune.ssl.default-dh-param 2048

    defaults
      log     global
      mode    http
      option  httplog
      option  dontlognull
      option  forwardfor
      timeout connect 5s
      timeout client  30s
      timeout server  30s
      errorfile 400 /etc/haproxy/errors/400.http
      errorfile 403 /etc/haproxy/errors/403.http
      errorfile 408 /etc/haproxy/errors/408.http
      errorfile 500 /etc/haproxy/errors/500.http
      errorfile 502 /etc/haproxy/errors/502.http
      errorfile 503 /etc/haproxy/errors/503.http
      errorfile 504 /etc/haproxy/errors/504.http

    frontend rate_limiter
      stick-table type ip size 100k expire 30s store http_req_rate(1s)

    # ── HTTPS — TCP pass-through to Pingora (Pingora terminates TLS + SNI) ──
    frontend https_passthrough
      bind *:443
      mode tcp
      option tcplog
      # L4 rate limiting by source IP (no content inspection in TCP mode).
      # For HTTP-layer rate limiting, rely on Pingora's upstream proxy.
      default_backend pingora_tls

    # ── HTTP — ACME challenges go to API; everything else redirects HTTPS ──
    frontend http
      bind *:80
      mode http
      acl is_acme path_beg /.well-known/acme-challenge/
      use_backend api_acme if is_acme
      http-request redirect scheme https code 301 if !is_acme

    backend pingora_tls
      mode tcp
      # Pingora handles TLS termination + SNI cert selection.
      server local 127.0.0.1:8443 check inter 5s fall 3 rise 2

    backend api_acme
      mode http
      # ACME HTTP-01 challenge responder — served by the API.
      server local 127.0.0.1:7070 check inter 5s fall 3 rise 2
    EOFTPL

  # VictoriaMetrics scrape config
  - |
    cat > /etc/liquid-metal/templates/victoriametrics-scrape.yaml <<'EOFTPL'
    scrape_configs:
      - job_name: node_exporter
        scrape_interval: 15s
        static_configs:
          - targets:
              - "$NODE_A_01_HOSTNAME:9100"
              - "$NODE_B_01_HOSTNAME:9100"
            labels:
              env: liquid-metal
      - job_name: nats
        scrape_interval: 15s
        metrics_path: /metrics
        static_configs:
          - targets:
              - "127.0.0.1:8222"
            labels:
              env: liquid-metal
      - job_name: node_exporter_nat
        scrape_interval: 15s
        static_configs:
          - targets:
              - "127.0.0.1:9100"
            labels:
              env: liquid-metal
              node: nat-vps
      - job_name: api
        scrape_interval: 15s
        static_configs:
          - targets:
              - "$NODE_A_01_HOSTNAME:9090"
              - "$NODE_B_01_HOSTNAME:9090"
            labels:
              env: liquid-metal
      - job_name: victorialogs
        scrape_interval: 15s
        static_configs:
          - targets:
              - "127.0.0.1:9428"
            labels:
              env: liquid-metal
      - job_name: tempo
        scrape_interval: 15s
        static_configs:
          - targets:
              - "127.0.0.1:3200"
            labels:
              env: liquid-metal
    EOFTPL

  # Backup scripts — source secrets.env at runtime for automatic rotation pickup
  - |
    cat > /etc/liquid-metal/templates/backup-postgres.sh <<'EOFTPL'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%SZ)
    DUMP_FILE="/tmp/pg-$TIMESTAMP.sql.gz"
    PGPASSWORD="$PG_PASSWORD" pg_dump \
      -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d "$PG_DBNAME" \
      --no-owner --no-acl \
      | gzip > "$DUMP_FILE"
    gsutil cp "$DUMP_FILE" "gs://$GCS_BUCKET_POSTGRES/$TIMESTAMP.sql.gz"
    rm -f "$DUMP_FILE"
    echo "$(date -u) postgres backup complete" >> /var/log/backups/postgres.log
    [ -n "$HEARTBEAT_URL_POSTGRES" ] && curl -fsS --retry 3 "$HEARTBEAT_URL_POSTGRES" > /dev/null
    EOFTPL

  - |
    cat > /etc/liquid-metal/templates/backup-victoriametrics.sh <<'EOFTPL'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%SZ)
    SNAP_RESP=$(curl -sf http://127.0.0.1:8428/snapshot/create)
    SNAP_NAME=$(echo "$SNAP_RESP" | grep -o '"snapshot":"[^"]*"' | cut -d'"' -f4)
    SNAP_PATH="/mnt/observability/victoriametrics/snapshots/$SNAP_NAME"
    gsutil -m rsync -r "$SNAP_PATH" "gs://$GCS_BUCKET_VICTORIAMETRICS/$TIMESTAMP/"
    curl -sf "http://127.0.0.1:8428/snapshot/delete?snapshot=$SNAP_NAME" > /dev/null
    echo "$(date -u) victoriametrics backup complete ($SNAP_NAME)" >> /var/log/backups/victoriametrics.log
    [ -n "$HEARTBEAT_URL_VICTORIAMETRICS" ] && curl -fsS --retry 3 "$HEARTBEAT_URL_VICTORIAMETRICS" > /dev/null
    EOFTPL

  - |
    cat > /etc/liquid-metal/templates/backup-victorialogs.sh <<'EOFTPL'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%SZ)
    TAR_FILE="/tmp/vlogs-$TIMESTAMP.tar.gz"
    tar -czf "$TAR_FILE" -C /mnt/observability victorialogs
    gsutil cp "$TAR_FILE" "gs://$GCS_BUCKET_VICTORIALOGS/$TIMESTAMP.tar.gz"
    rm -f "$TAR_FILE"
    echo "$(date -u) victorialogs backup complete" >> /var/log/backups/victorialogs.log
    [ -n "$HEARTBEAT_URL_VICTORIALOGS" ] && curl -fsS --retry 3 "$HEARTBEAT_URL_VICTORIALOGS" > /dev/null
    EOFTPL

  - |
    cat > /etc/liquid-metal/templates/backup-artifacts.sh <<'EOFTPL'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    rclone sync vultr-s3:$S3_BUCKET gcs-backups:$GCS_BUCKET_ARTIFACTS \
      --transfers=8 \
      --checkers=16 \
      --fast-list \
      --log-file=/var/log/backups/artifacts.log \
      --log-level=INFO
    echo "$(date -u) artifacts sync complete" >> /var/log/backups/artifacts.log
    [ -n "$HEARTBEAT_URL_ARTIFACTS" ] && curl -fsS --retry 3 "$HEARTBEAT_URL_ARTIFACTS" > /dev/null
    EOFTPL

  # ── Render Script (12-Factor: config from env) ──────────────────────────────
  # Sources secrets.env and renders all config templates via envsubst.
  # Idempotent — safe to re-run after secret rotation.
  - |
    cat > /opt/liquid-metal/render-configs.sh <<'EOFSCRIPT'
    #!/bin/bash
    set -euo pipefail

    SECRETS_FILE="/etc/liquid-metal/secrets.env"
    TEMPLATES="/etc/liquid-metal/templates"

    if [ ! -f "$SECRETS_FILE" ]; then
      echo "ERROR: $SECRETS_FILE not found" >&2
      exit 1
    fi

    # Export all secrets as environment variables.
    set -a
    source "$SECRETS_FILE"
    set +a

    echo "Rendering configs from templates..."

    # NATS — restrict to known vars so $JS.API.> in ACL rules isn't clobbered
    envsubst '$NATS_USER $NATS_PASSWORD $NATS_PASSWORD_DAEMON $NATS_PASSWORD_PROXY' \
      < "$TEMPLATES/nats.conf" > /etc/nats/nats.conf

    # PgBouncer
    envsubst < "$TEMPLATES/pgbouncer.ini"              > /etc/pgbouncer/pgbouncer.ini
    envsubst < "$TEMPLATES/userlist.txt"               > /etc/pgbouncer/userlist.txt
    chmod 600 /etc/pgbouncer/userlist.txt
    chown postgres:postgres /etc/pgbouncer/userlist.txt

    # Certbot / Cloudflare
    mkdir -p /etc/letsencrypt
    envsubst < "$TEMPLATES/cloudflare.ini"             > /etc/letsencrypt/cloudflare.ini
    chmod 600 /etc/letsencrypt/cloudflare.ini

    # HAProxy
    envsubst < "$TEMPLATES/haproxy.cfg"                > /etc/haproxy/haproxy.cfg

    # VictoriaMetrics scrape config
    mkdir -p /etc/victoriametrics
    envsubst < "$TEMPLATES/victoriametrics-scrape.yaml" > /etc/victoriametrics/scrape.yaml

    # Grafana
    mkdir -p /etc/grafana/provisioning/datasources /etc/grafana/provisioning/plugins /etc/grafana/provisioning/alerting
    envsubst < "$TEMPLATES/grafana-datasources.yaml"   > /etc/grafana/provisioning/datasources/datasources.yaml
    envsubst < "$TEMPLATES/grafana.ini"                > /etc/grafana/grafana.ini
    envsubst < "$TEMPLATES/grafana-contactpoints.yaml" > /etc/grafana/provisioning/alerting/contactpoints.yaml
    cp "$TEMPLATES/grafana-policies.yaml"              /etc/grafana/provisioning/alerting/policies.yaml

    # Tempo
    mkdir -p /etc/tempo
    cp "$TEMPLATES/tempo.yaml"                         /etc/tempo/config.yaml

    # Gatus
    mkdir -p /etc/gatus
    envsubst < "$TEMPLATES/gatus.yaml"                 > /etc/gatus/config.yaml

    # Dashboards
    mkdir -p /etc/grafana/provisioning/dashboards/json
    cp "$TEMPLATES/grafana-dashboards.yaml"            /etc/grafana/provisioning/dashboards/dashboards.yaml
    cp "$TEMPLATES/dashboard-node-overview.json"       /etc/grafana/provisioning/dashboards/json/node-overview.json
    cp "$TEMPLATES/dashboard-api-metrics.json"         /etc/grafana/provisioning/dashboards/json/api-metrics.json
    cp "$TEMPLATES/dashboard-nats-overview.json"       /etc/grafana/provisioning/dashboards/json/nats-overview.json

    # rclone
    mkdir -p /root/.config/rclone
    envsubst < "$TEMPLATES/rclone.conf"                > /root/.config/rclone/rclone.conf
    chmod 600 /root/.config/rclone/rclone.conf

    # Backup scripts — source secrets.env at runtime, so just copy them.
    mkdir -p /opt/backups/scripts
    cp "$TEMPLATES/backup-postgres.sh"         /opt/backups/scripts/backup-postgres.sh
    cp "$TEMPLATES/backup-victoriametrics.sh"  /opt/backups/scripts/backup-victoriametrics.sh
    cp "$TEMPLATES/backup-victorialogs.sh"     /opt/backups/scripts/backup-victorialogs.sh
    cp "$TEMPLATES/backup-artifacts.sh"        /opt/backups/scripts/backup-artifacts.sh
    chmod +x /opt/backups/scripts/*.sh

    echo "All configs rendered."
    EOFSCRIPT
  - chmod +x /opt/liquid-metal/render-configs.sh

  # ── Rotate Script ───────────────────────────────────────────────────────────
  # Usage: /opt/liquid-metal/rotate-secrets.sh [new-secrets.env]
  # If no argument, re-renders with current secrets. If argument given,
  # replaces secrets.env first.
  - |
    cat > /opt/liquid-metal/rotate-secrets.sh <<'EOFSCRIPT'
    #!/bin/bash
    set -euo pipefail

    SECRETS_FILE="/etc/liquid-metal/secrets.env"

    if [ -n "${1:-}" ]; then
      echo "Installing new secrets from $1..."
      cp "$1" "$SECRETS_FILE"
      chmod 600 "$SECRETS_FILE"
    fi

    # Re-render all config files.
    /opt/liquid-metal/render-configs.sh

    # Restart services that read config files (not backup scripts — they
    # source secrets.env at runtime and pick up changes automatically).
    echo "Restarting services..."
    systemctl restart nats pgbouncer haproxy grafana gatus

    echo "Secret rotation complete."
    EOFSCRIPT
  - chmod +x /opt/liquid-metal/rotate-secrets.sh

  # ── Install Binaries ────────────────────────────────────────────────────────

  # Nomad server
  - curl -fsSL https://releases.hashicorp.com/nomad/1.9.5/nomad_1.9.5_linux_amd64.zip -o /tmp/nomad.zip
  - unzip /tmp/nomad.zip -d /usr/local/bin/
  - chmod +x /usr/local/bin/nomad

  # NATS server
  - curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.zip -o /tmp/nats.zip
  - unzip /tmp/nats.zip -d /tmp/nats-server
  - mv /tmp/nats-server/nats-server-*/nats-server /usr/local/bin/nats-server

  # gsutil / gcloud
  - curl -fsSL https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz | tar -xz -C /opt
  - /opt/google-cloud-sdk/install.sh --quiet --path-update=true
  - ln -sf /opt/google-cloud-sdk/bin/gsutil /usr/local/bin/gsutil
  - ln -sf /opt/google-cloud-sdk/bin/gcloud /usr/local/bin/gcloud
  - gcloud auth activate-service-account --key-file=/etc/liquid-metal/gcs-sa.json

  # rclone
  - curl -fsSL https://rclone.org/install.sh | bash

  # VictoriaMetrics
  - curl -fsSL https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v1.112.0/victoria-metrics-linux-amd64-v1.112.0.tar.gz | tar -xz -C /usr/local/bin/
  - chmod +x /usr/local/bin/victoria-metrics-prod

  # VictoriaLogs
  - curl -fsSL https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v1.112.0/victoria-logs-linux-amd64-v1.112.0.tar.gz | tar -xz -C /usr/local/bin/
  - chmod +x /usr/local/bin/victoria-logs-prod

  # Grafana
  - curl -fsSL https://dl.grafana.com/oss/release/grafana-11.5.2.linux-amd64.tar.gz | tar -xz -C /opt
  - ln -sf /opt/grafana-v11.5.2 /opt/grafana
  - /opt/grafana/bin/grafana cli --pluginsDir=/opt/grafana/data/plugins plugins install victoriametrics-logs-datasource

  # Certbot
  - apt-get install -y certbot python3-certbot-dns-cloudflare

  # node_exporter (NAT VPS — with textfile collector for TLS cert expiry)
  - curl -fsSL https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz | tar -xz -C /tmp
  - mv /tmp/node_exporter-1.8.2.linux-amd64/node_exporter /usr/local/bin/node_exporter
  - chmod +x /usr/local/bin/node_exporter
  - mkdir -p /var/lib/node_exporter/textfile_collector

  # TLS certificate expiry check script
  - |
    cat > /opt/liquid-metal/check-cert-expiry.sh <<'EOFSCRIPT'
    #!/bin/bash
    set -euo pipefail
    source /etc/liquid-metal/secrets.env
    CERT="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
    OUT="/var/lib/node_exporter/textfile_collector/cert_expiry.prom"
    if [ -f "$CERT" ]; then
      EXPIRY=$(openssl x509 -enddate -noout -in "$CERT" | cut -d= -f2)
      EPOCH=$(date -d "$EXPIRY" +%s)
      cat > "$OUT.tmp" <<PROM
    # HELP tls_cert_expiry_timestamp_seconds TLS certificate expiry epoch
    # TYPE tls_cert_expiry_timestamp_seconds gauge
    tls_cert_expiry_timestamp_seconds{domain="$DOMAIN"} $EPOCH
    PROM
      mv "$OUT.tmp" "$OUT"
    fi
    EOFSCRIPT
  - chmod +x /opt/liquid-metal/check-cert-expiry.sh

  # Grafana Tempo (distributed tracing backend)
  - curl -fsSL https://github.com/grafana/tempo/releases/download/v2.7.2/tempo_2.7.2_linux_amd64.tar.gz | tar -xz -C /usr/local/bin/ tempo
  - chmod +x /usr/local/bin/tempo

  # Gatus uptime monitor
  - curl -fsSL https://github.com/TwiN/gatus/releases/download/v5.16.0/gatus_5.16.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin/ gatus
  - chmod +x /usr/local/bin/gatus
  - mkdir -p /var/lib/gatus

  # ── Render Configs From Secrets ─────────────────────────────────────────────
  # First render — produces all config files from templates + secrets.env.
  - mkdir -p /etc/nats /var/lib/nats/jetstream /var/log/backups /etc/pgbouncer
  - /opt/liquid-metal/render-configs.sh

  # ── TLS (certbot + Cloudflare DNS-01) ──────────────────────────────────────
  - certbot certonly --dns-cloudflare --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini -d "${domain}" -d "*.${domain}" --non-interactive --agree-tos -m admin@${domain}
  - |
    cat /etc/letsencrypt/live/${domain}/fullchain.pem \
        /etc/letsencrypt/live/${domain}/privkey.pem \
        > /etc/letsencrypt/live/${domain}/combined.pem
  - chmod 600 /etc/letsencrypt/live/${domain}/combined.pem
  - |
    (crontab -l 2>/dev/null || true; echo "0 2 * * * certbot renew --quiet --deploy-hook 'systemctl reload haproxy'") | crontab -

  # ── Systemd Units ───────────────────────────────────────────────────────────

  # Nomad (server mode — tiebreaker only)
  - mkdir -p /etc/nomad.d /var/lib/nomad /var/log/nomad
  - |
    cat > /etc/nomad.d/server.hcl <<EOF
    data_dir  = "/var/lib/nomad"
    log_level = "INFO"

    log_file             = "/var/log/nomad/nomad.log"
    log_rotate_duration  = "24h"
    log_rotate_max_files = 7

    server {
      enabled          = true
      bootstrap_expect = 1
    }

    client {
      enabled    = true
      node_class = "gateway"
      options {
        "driver.raw_exec.enable" = "1"
      }
      meta {
        gateway_role = "primary"
      }
    }
    EOF
  - |
    cat > /etc/systemd/system/nomad.service <<EOF
    [Unit]
    Description=Nomad
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/nomad agent -config=/etc/nomad.d/
    Restart=on-failure
    RestartSec=5
    LimitNOFILE=65536

    [Install]
    WantedBy=multi-user.target
    EOF

  # NATS
  - |
    cat > /etc/systemd/system/nats.service <<EOF
    [Unit]
    Description=NATS Server
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/nats-server -c /etc/nats/nats.conf
    Restart=on-failure
    RestartSec=5
    LimitNOFILE=65536

    [Install]
    WantedBy=multi-user.target
    EOF

  # node_exporter (NAT VPS)
  - |
    cat > /etc/systemd/system/node_exporter.service <<EOF
    [Unit]
    Description=Prometheus Node Exporter
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/node_exporter \
      --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # VictoriaMetrics
  - |
    cat > /etc/systemd/system/victoriametrics.service <<EOF
    [Unit]
    Description=VictoriaMetrics
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/victoria-metrics-prod \
      -storageDataPath=/mnt/observability/victoriametrics \
      -retentionPeriod=30d \
      -promscrape.config=/etc/victoriametrics/scrape.yaml \
      -httpListenAddr=:8428 \
      -snapshot.createURL=http://127.0.0.1:8428/snapshot/create
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # VictoriaLogs
  - |
    cat > /etc/systemd/system/victorialogs.service <<EOF
    [Unit]
    Description=VictoriaLogs
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/victoria-logs-prod \
      -storageDataPath=/mnt/observability/victorialogs \
      -retentionPeriod=30d \
      -httpListenAddr=:9428
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # Grafana
  - |
    cat > /etc/systemd/system/grafana.service <<EOF
    [Unit]
    Description=Grafana
    After=network.target victoriametrics.service victorialogs.service

    [Service]
    ExecStart=/opt/grafana/bin/grafana server --config=/etc/grafana/grafana.ini --homepath=/opt/grafana
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # Tempo
  - |
    cat > /etc/systemd/system/tempo.service <<EOF
    [Unit]
    Description=Grafana Tempo
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/tempo -config.file=/etc/tempo/config.yaml
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # Gatus
  - |
    cat > /etc/systemd/system/gatus.service <<EOF
    [Unit]
    Description=Gatus Uptime Monitor
    After=network.target

    [Service]
    ExecStart=/usr/local/bin/gatus --config /etc/gatus/config.yaml
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # ── HAProxy logging → file (for Promtail) ──────────────────────────────────
  - |
    cat > /etc/rsyslog.d/49-haproxy.conf <<'EOF'
    local0.* /var/log/haproxy.log
    & stop
    EOF
  - systemctl restart rsyslog

  # Logrotate for HAProxy log file
  - |
    cat > /etc/logrotate.d/haproxy <<'EOF'
    /var/log/haproxy.log {
      daily
      rotate 7
      compress
      delaycompress
      missingok
      notifempty
      postrotate
        /usr/lib/rsyslog/rsyslog-rotate
      endscript
    }
    EOF

  # ── Promtail (NAT VPS) ─────────────────────────────────────────────────────
  # Ships HAProxy logs + systemd journal to local VictoriaLogs.
  - curl -fsSL https://github.com/grafana/loki/releases/download/v3.4.2/promtail-linux-amd64.zip -o /tmp/promtail.zip
  - unzip /tmp/promtail.zip -d /usr/local/bin/
  - chmod +x /usr/local/bin/promtail-linux-amd64
  - mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
  - mkdir -p /etc/promtail /var/lib/promtail
  - |
    cat > /etc/promtail/config.yaml <<'EOF'
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /var/lib/promtail/positions.yaml

    clients:
      - url: http://127.0.0.1:9428/insert/loki/api/v1/push
        batchsize: 1048576
        batchwait: 3s
        backoff_config:
          min_period: 500ms
          max_period: 30s
          max_retries: 10

    limits_config:
      readline_rate_enabled: true
      readline_rate: 5000
      readline_burst: 10000
      readline_rate_drop: true

    scrape_configs:
      - job_name: haproxy
        static_configs:
          - targets:
              - localhost
            labels:
              node: nat-vps
              service: haproxy
              __path__: /var/log/haproxy.log
        pipeline_stages:
          - limit:
              rate: 1000
              burst: 2000
              drop: true

      - job_name: journal
        journal:
          max_age: 12h
          labels:
            node: nat-vps
        relabel_configs:
          - source_labels: ['__journal__systemd_unit']
            target_label: unit
    EOF
  - |
    cat > /etc/systemd/system/promtail.service <<'EOF'
    [Unit]
    Description=Promtail
    After=network.target victorialogs.service

    [Service]
    ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yaml
    Restart=on-failure
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

  # Grafana alerting rules
  - |
    cat > /etc/grafana/provisioning/alerting/alerts.yaml <<'EOF'
    apiVersion: 1
    groups:
      - orgId: 1
        name: Infrastructure
        folder: Alerts
        interval: 1m
        rules:
          - uid: node-down
            title: Node Down
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: up{job="node_exporter"} == 0
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 2m
            annotations:
              summary: "Node {{ $labels.instance }} is unreachable"

          - uid: disk-space-critical
            title: Disk Space Critical
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 5m
            annotations:
              summary: "Disk space below 10% on {{ $labels.instance }}"

          - uid: high-cpu
            title: High CPU Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 10m
            annotations:
              summary: "CPU usage above 90% on {{ $labels.instance }} for 10m"

          - uid: high-memory
            title: High Memory Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 5m
            annotations:
              summary: "Memory usage above 90% on {{ $labels.instance }}"

          - uid: observability-disk
            title: Observability Volume Low
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: (node_filesystem_avail_bytes{mountpoint="/mnt/observability"} / node_filesystem_size_bytes{mountpoint="/mnt/observability"}) * 100 < 15
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 5m
            annotations:
              summary: "Observability volume below 15% free space"

          - uid: stuck-provisioning
            title: Stuck Provisioning
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: postgres
                model:
                  rawSql: "SELECT COUNT(*) AS stuck FROM services WHERE status = 'provisioning' AND created_at < NOW() - INTERVAL '10 minutes' AND deleted_at IS NULL"
                  format: table
              - refId: C
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 0s
            annotations:
              summary: "{{ $values.A.Value }} services stuck in provisioning for >10 minutes — watchdog will auto-heal, investigate daemon logs"

          - uid: cert-expiry
            title: TLS Certificate Expiring Soon
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: (tls_cert_expiry_timestamp_seconds - time()) / 86400 < 14
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 1h
            annotations:
              summary: "TLS certificate for {{ $labels.domain }} expires in less than 14 days"

          - uid: vlogs-ingest-stalled
            title: VictoriaLogs Ingest Stalled
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: rate(vl_rows_ingested_total[5m])
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            for: 5m
            annotations:
              summary: "VictoriaLogs ingest rate has been zero for 5+ minutes — Promtail may have stopped shipping logs"

          - uid: ebpf-isolation-breach
            title: eBPF Isolation Breach (P0)
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victorialogs
                model:
                  expr: '_msg:"ISOLATION BREACH" OR _msg:"eBPF isolation breach"'
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: count
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            for: 0s
            annotations:
              summary: "P0: eBPF isolation breach detected — VMs may be running without network isolation. Check daemon-metal logs immediately."

          - uid: tempo-ingest-stalled
            title: Tempo Trace Ingest Stalled
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: prometheus
                model:
                  expr: rate(tempo_distributor_spans_received_total[5m])
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            for: 10m
            annotations:
              summary: "No traces received by Tempo in 10+ minutes — OTEL tracing pipeline may be broken"
    EOF

  # ── Block Storage Mount ────────────────────────────────────────────────────
  - mkdir -p /mnt/observability
  - |
    if ! blkid /dev/vdb | grep -q ext4; then
      mkfs.ext4 -L observability /dev/vdb
    fi
  - mount /dev/vdb /mnt/observability
  - echo '/dev/vdb /mnt/observability ext4 defaults,nofail 0 2' >> /etc/fstab
  - mkdir -p /mnt/observability/victoriametrics /mnt/observability/victorialogs /mnt/observability/grafana /mnt/observability/tempo

  # ── Start Services ──────────────────────────────────────────────────────────
  - systemctl daemon-reload
  - systemctl enable nomad nats node_exporter victoriametrics victorialogs tempo grafana gatus haproxy pgbouncer promtail
  - systemctl start nomad nats pgbouncer node_exporter victoriametrics victorialogs tempo grafana gatus haproxy promtail

  # Run cert expiry check once at boot, then every 6 hours via cron
  - /opt/liquid-metal/check-cert-expiry.sh

  # ── Logrotate: backup logs ──────────────────────────────────────────────────
  - |
    cat > /etc/logrotate.d/liquid-metal-backups <<'EOF'
    /var/log/backups/*.log {
      daily
      rotate 7
      compress
      delaycompress
      missingok
      notifempty
      create 0644 root root
    }
    EOF

  # ── Backup Crons ────────────────────────────────────────────────────────────
  - |
    (crontab -l 2>/dev/null || true; cat <<'EOFCRON'
    0 3 * * * /opt/backups/scripts/backup-postgres.sh 2>&1 | tee -a /var/log/backups/postgres.log
    30 3 * * * /opt/backups/scripts/backup-victoriametrics.sh 2>&1 | tee -a /var/log/backups/victoriametrics.log
    0 4 * * * /opt/backups/scripts/backup-victorialogs.sh 2>&1 | tee -a /var/log/backups/victorialogs.log
    30 4 * * * /opt/backups/scripts/backup-artifacts.sh 2>&1 | tee -a /var/log/backups/artifacts.log
    0 */6 * * * /opt/liquid-metal/check-cert-expiry.sh
    EOFCRON
    ) | crontab -
