services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liquid-metal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquid-metal}
      POSTGRES_DB: ${POSTGRES_DB:-liquid-metal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring → http://localhost:8222
    volumes:
      - natsdata:/data

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001" # console → http://localhost:9001
    volumes:
      - rustfsdata:/data

volumes:
  pgdata:
  natsdata:
  rustfsdata:
