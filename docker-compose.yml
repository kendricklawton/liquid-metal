services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liquid-metal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquid-metal}
      POSTGRES_DB: ${POSTGRES_DB:-liquid-metal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring → http://localhost:8222
    volumes:
      - natsdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001" # console → http://localhost:9001
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  natsdata:
  miniodata:
