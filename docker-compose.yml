services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liquid-metal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquid-metal}
      POSTGRES_DB: ${POSTGRES_DB:-liquid-metal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring → http://localhost:8222
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  natsdata:
