# ============================================================================
# Liquid Metal — Cilium Network Policy
# "Black Hole" VM Isolation
#
# Applied via: cilium policy import deploy/cilium/vm-isolation.yaml
#
# Identity model (bare-metal Cilium without K8s):
#   Cilium assigns a security identity to each endpoint (TAP interface).
#   Labels are set when the daemon creates the endpoint:
#     liquid-metal.io/role=vm
#     liquid-metal.io/service-id={uuid}
#     liquid-metal.io/engine=metal
#
# The three rules below implement:
#   1. Default Deny  — VMs start isolated (no ingress, no egress)
#   2. Proxy Ingress — only Pingora proxy may forward traffic to a VM
#   3. Internet Egress — VMs may reach the public internet outbound
#   4. VM-to-VM Deny  — VM_A cannot talk to VM_B (enforced by omission)
#   5. Host Service Deny — VMs cannot reach Postgres, NATS, or RustFS
#      (enforced by omitting those CIDRs from the egress allow-list)
# ============================================================================

[
  {
    "labels": [{"key": "name", "value": "vm-ingress-from-proxy"}],
    "endpointSelector": {
      "matchLabels": {
        "liquid-metal.io/role": "vm"
      }
    },
    "ingress": [
      {
        "fromEndpoints": [
          {
            "matchLabels": {
              "liquid-metal.io/role": "proxy"
            }
          }
        ]
      }
    ]
  },
  {
    "labels": [{"key": "name", "value": "vm-egress-internet-only"}],
    "endpointSelector": {
      "matchLabels": {
        "liquid-metal.io/role": "vm"
      }
    },
    "egress": [
      {
        "toEntities": ["world"],
        "toPorts": [
          {
            "ports": [
              {"port": "80",  "protocol": "TCP"},
              {"port": "443", "protocol": "TCP"},
              {"port": "53",  "protocol": "UDP"}
            ]
          }
        ]
      }
    ]
  },
  {
    "labels": [{"key": "name", "value": "proxy-egress-to-vms"}],
    "endpointSelector": {
      "matchLabels": {
        "liquid-metal.io/role": "proxy"
      }
    },
    "egress": [
      {
        "toEndpoints": [
          {
            "matchLabels": {
              "liquid-metal.io/role": "vm"
            }
          }
        ]
      },
      {
        "toEntities": ["world"],
        "toPorts": [
          {
            "ports": [
              {"port": "80",  "protocol": "TCP"},
              {"port": "443", "protocol": "TCP"}
            ]
          }
        ]
      }
    ]
  }
]

# ============================================================================
# What is NOT allowed (by omission — default deny):
#
#   VM  → VM        : no toEndpoints for vm→vm in any rule
#   VM  → Postgres  : port 5432 not in egress allow-list
#   VM  → NATS      : port 4222 not in egress allow-list
#   VM  → RustFS    : host CIDR not in egress allow-list
#   VM  → Proxy     : proxy not in vm egress allow-list
#
# Applying the policy:
#   cilium policy import deploy/cilium/vm-isolation.yaml
#   cilium policy get                  # verify
#   cilium endpoint list               # see identities
#
# Labelling endpoints at provision time (called by daemon after TAP creation):
#   cilium endpoint label <ep-id> \
#     liquid-metal.io/role=vm \
#     liquid-metal.io/service-id=<uuid> \
#     liquid-metal.io/engine=metal
# ============================================================================
